<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vantage — Sign in</title>
<meta name="description" content="Vantage. Clarity, from a distance." />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,wght@1,400;1,500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Ambient background system ===== -->
  <div class="bg" aria-hidden="true">
    <div class="bg__base"></div>
    <div class="bg__aurora bg__aurora--a"></div>
    <div class="bg__aurora bg__aurora--b"></div>
    <div class="bg__glow" id="cursorGlow"></div>
    <svg class="bg__noise"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"></feTurbulence><feColorMatrix type="saturate" values="0"></feColorMatrix></filter><rect width="100%" height="100%" filter="url(#noiseFilter)"></rect></svg>
    <div class="bg__grid"></div>
    <div class="bg__vignette"></div>
  </div>

  <!-- ===== Toast host ===== -->
  <div class="toast-host" id="toastHost" aria-live="polite"></div>

  <!-- ===== Main ===== -->
  <main class="stage">

    <div class="card" id="loginCard">

      <!-- Mark -->
      <div class="brand" id="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none">
            <path class="mark-path mark-path--1" d="M24 6 L40 34" stroke="url(#markGradA)" stroke-width="3.4" stroke-linecap="round"/>
            <path class="mark-path mark-path--2" d="M24 6 L8 34" stroke="url(#markGradB)" stroke-width="3.4" stroke-linecap="round"/>
            <path class="mark-path mark-path--3" d="M13.5 26 L34.5 26" stroke="url(#markGradA)" stroke-width="3.4" stroke-linecap="round"/>
            <circle class="mark-dot" cx="24" cy="6" r="3.2" fill="#F0C674"/>
            <defs>
              <linearGradient id="markGradA" x1="8" y1="6" x2="40" y2="34" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#9A85FF"/>
                <stop offset="1" stop-color="#6E56E8"/>
              </linearGradient>
              <linearGradient id="markGradB" x1="24" y1="6" x2="8" y2="34" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#B7A6FF"/>
                <stop offset="1" stop-color="#7C64F0"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="brand__word">Vantage</span>
      </div>

      <div class="intro" id="intro">
        <h1 class="intro__title">おかえりなさい</h1>
        <p class="intro__tagline">Clarity, from a distance.</p>
      </div>

      <!-- Form -->
      <form class="form" id="loginForm" novalidate>

        <div class="field" id="fieldEmail">
          <label class="field__label" for="email">Email</label>
          <div class="field__control">
            <svg class="field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16v12H4z"/><path d="M4 7l8 6 8-6"/></svg>
            <input class="field__input" type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required />
          </div>
        </div>

        <div class="field" id="fieldPassword">
          <div class="field__row">
            <label class="field__label" for="password">Password</label>
            <button type="button" class="link link--ghost" id="forgotTrigger">パスワードをお忘れですか？</button>
          </div>
          <div class="field__control">
            <svg class="field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
            <input class="field__input" type="password" id="password" name="password" placeholder="••••••••••" autocomplete="current-password" required />
            <button type="button" class="field__toggle" id="togglePassword" aria-label="パスワードを表示" data-tooltip="表示 / 非表示">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form__meta">
          <label class="checkbox">
            <input type="checkbox" id="remember" name="remember" />
            <span class="checkbox__box" aria-hidden="true">
              <svg viewBox="0 0 16 16" fill="none"><path d="M3.5 8.2l3 3 6-6.4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
            <span class="checkbox__label">ログイン状態を保存</span>
          </label>
        </div>

        <button type="submit" class="btn btn--primary" id="submitBtn">
          <span class="btn__label">サインイン</span>
          <span class="btn__spinner" aria-hidden="true"></span>
        </button>

        <div class="divider"><span>または</span></div>

        <div class="oauth">
          <button type="button" class="btn btn--oauth" id="googleBtn">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.3-1.7 3.8-5.5 3.8-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.15.8 3.88 1.5l2.64-2.55C16.86 2.9 14.7 2 12 2 6.98 2 2.9 6.1 2.9 11.1S6.98 20.2 12 20.2c6.9 0 9.3-4.85 9.3-7.35 0-.5-.05-.87-.12-1.25H12z"/></svg>
            <span>Google で続ける</span>
          </button>
          <button type="button" class="btn btn--oauth" id="githubBtn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.5 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.22-3.37-1.22-.46-1.2-1.11-1.52-1.11-1.52-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.57 2.34 1.12 2.91.85.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.28 2.75 1.05a9.3 9.3 0 0 1 5 0c1.9-1.33 2.75-1.05 2.75-1.05.55 1.42.2 2.47.1 2.73.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .28.18.61.69.5A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>
            <span>GitHub で続ける</span>
          </button>
        </div>

        <p class="signup-hint">アカウントをお持ちでない方は <a href="#" class="link">新規登録</a></p>
      </form>
    </div>

    <p class="legal">続行することで、Vantage の <a href="#" class="link">利用規約</a> および <a href="#" class="link">プライバシーポリシー</a> に同意したものとみなされます。</p>
  </main>

  <!-- ===== Forgot Password Dialog ===== -->
  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog" id="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <button class="dialog__close" id="dialogClose" aria-label="閉じる">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <h2 class="dialog__title" id="dialogTitle">パスワードをリセット</h2>
      <p class="dialog__desc">登録済みのメールアドレスを入力してください。リセット用のリンクをお送りします。</p>
      <div class="field">
        <div class="field__control">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16v12H4z"/><path d="M4 7l8 6 8-6"/></svg>
          <input class="field__input" type="email" placeholder="you@company.com" id="resetEmail" />
        </div>
      </div>
      <button class="btn btn--primary" id="resetSendBtn">
        <span class="btn__label">リセットリンクを送信</span>
        <span class="btn__spinner" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
